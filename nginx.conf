server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # ─── Charset ──────────────────────────────────────────────────────────
    charset utf-8;

    # ─── Cabeceras de seguridad ────────────────────────────────────────────
    # CSP alineada con vite.config.ts (server.headers en dev)
    # En producción no hay Google Fonts en runtime porque están cacheadas,
    # pero las incluimos por si el caché expira.
    add_header Content-Security-Policy
        "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob:; connect-src 'self'; worker-src 'self' blob:;"
        always;

    add_header X-Content-Type-Options  "nosniff"       always;
    add_header X-Frame-Options         "DENY"          always;
    add_header Referrer-Policy         "no-referrer"   always;

    # Permite instalar la PWA: indica que la app puede ser guardada en pantalla
    # de inicio desde Safari iOS (requiere header permissive en algunos casos)
    add_header Permissions-Policy "geolocation=(), camera=(), microphone=()" always;

    # ─── Caché para Service Worker ─────────────────────────────────────────
    # CRÍTICO para PWA: el SW nunca debe cachearse en el browser.
    # Si se cachea, autoUpdate deja de funcionar y el usuario queda
    # atascado en una versión vieja aunque el SW haya cambiado.
    location ~* (sw\.js|workbox-.*\.js)$ {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate";
        add_header Pragma "no-cache";
        expires 0;
    }

    # ─── Caché para el manifest de la PWA ─────────────────────────────────
    location ~* \.webmanifest$ {
        add_header Content-Type "application/manifest+json";
        add_header Cache-Control "public, max-age=86400"; # 1 día
    }

    # ─── Caché agresiva para assets con hash de contenido ─────────────────
    # Vite genera nombres como: index-BxQk3hPa.js — el hash cambia si el
    # contenido cambia, así que cachear 1 año es seguro.
    location ~* \.(js|css|woff2|woff|ttf|ico|png|svg|jpg|jpeg|gif|webp)$ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # ─── index.html: nunca cachear ─────────────────────────────────────────
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # ─── SPA routing ──────────────────────────────────────────────────────
    # Todas las rutas que no correspondan a un archivo estático sirven
    # index.html. Permite que React maneje la navegación client-side.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ─── Ocultar versión de nginx ──────────────────────────────────────────
    server_tokens off;
}
